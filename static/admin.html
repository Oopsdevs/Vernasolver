<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VernaSolver — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --amber: #f59e0b;
      --green: #10b981;
      --danger: #ef4444;

      --bg: #0a0a18;
      --bg-2: #14142b;
      --sidebar-bg: #08081a;
      --glass: rgba(255,255,255,.04);
      --glass-strong: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.08);
      --border-strong: rgba(255,255,255,.14);

      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --radius: 12px;

      --display: "Space Grotesk", system-ui, sans-serif;
      --body-font: "Inter", system-ui, sans-serif;
      --arcade: "Press Start 2P", monospace;
    }

    body {
      font-family: var(--body-font); color: var(--text);
      background:
        radial-gradient(ellipse 1200px 600px at 20% 10%, rgba(99,102,241,.10), transparent 60%),
        radial-gradient(ellipse 900px 500px at 80% 90%, rgba(236,72,153,.08), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      background-attachment: fixed;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      height: 58px; background: rgba(8, 8, 26, .72); backdrop-filter: blur(18px);
      display: flex; align-items: center; padding: 0 24px; gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--arcade); font-size: 0.78rem; letter-spacing: 1.5px;
      background: linear-gradient(135deg, #fff, var(--primary) 70%, var(--pink));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .logo span { color: var(--pink); -webkit-background-clip: initial; background-clip: initial; }
    header > a {
      margin-left: auto;
      color: var(--text-muted); font-size: 0.82rem; text-decoration: none;
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
      transition: all .15s; font-weight: 500; background: rgba(255,255,255,.02);
    }
    header > a:hover { color: #fff; border-color: var(--primary); background: rgba(99,102,241,.1); box-shadow: 0 4px 14px rgba(99,102,241,.25); }

    /* ── Page ──────────────────────────────────────────────────────────── */
    .page { max-width: 800px; margin: 0 auto; padding: 36px 22px 60px; display: flex; flex-direction: column; gap: 30px; }

    h1 {
      font-family: var(--display); font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--primary) 80%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      letter-spacing: -.02em;
    }
    h2 {
      font-family: var(--display); font-size: 1.05rem; font-weight: 600;
      color: #fff; margin-bottom: 16px;
    }

    /* ── Card ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--glass-strong);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 26px;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }

    /* ── Drop zone ──────────────────────────────────────────────────────── */
    #dropzone {
      border: 2px dashed var(--border-strong); border-radius: var(--radius); padding: 36px;
      text-align: center; cursor: pointer; transition: all .2s;
      background: rgba(255,255,255,.02);
    }
    #dropzone.drag-over {
      border-color: var(--primary);
      background: rgba(99,102,241,.08);
      box-shadow: 0 0 0 4px rgba(99,102,241,.12), inset 0 0 40px rgba(99,102,241,.08);
    }
    #dropzone .icon { font-size: 2.8rem; margin-bottom: 10px; filter: drop-shadow(0 4px 14px rgba(99,102,241,.4)); }
    #dropzone p { color: var(--text-muted); font-size: 0.875rem; }
    #dropzone p strong {
      background: linear-gradient(135deg, var(--primary), var(--pink));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      cursor: pointer; font-weight: 700;
    }
    #fileInput { display: none; }
    #fileName { margin-top: 12px; font-size: 0.85rem; color: #fff; font-weight: 500; }

    /* ── Form fields ──────────────────────────────────────────────────── */
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    .field label {
      font-family: var(--arcade); font-size: 0.55rem; letter-spacing: .12em;
      color: var(--text-dim); text-transform: uppercase;
    }
    .field input {
      background: var(--glass); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: 0.9rem; font-family: var(--body-font);
      outline: none; transition: all .2s;
    }
    .field input::placeholder { color: var(--text-dim); }
    .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.2); background: rgba(99,102,241,.06); }

    /* ── Submit ────────────────────────────────────────────────────────── */
    #submitBtn {
      margin-top: 22px; width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--purple), var(--pink));
      color: #fff; border: none; border-radius: 12px;
      font-family: var(--body-font); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 6px 20px rgba(99,102,241,.4);
    }
    #submitBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(236,72,153,.5); }
    #submitBtn:disabled {
      background: linear-gradient(135deg, rgba(99,102,241,.35), rgba(236,72,153,.25));
      opacity: .5; cursor: not-allowed; box-shadow: none;
    }

    /* ── Progress / status ─────────────────────────────────────────────── */
    #statusBox {
      display: none; margin-top: 16px; padding: 13px 16px;
      border-radius: 10px; font-size: 0.875rem;
      backdrop-filter: blur(8px);
    }
    #statusBox.running { background: rgba(99,102,241,.10); color: #c7d2fe; border: 1px solid rgba(99,102,241,.35); }
    #statusBox.done    { background: rgba(16,185,129,.10); color: #6ee7b7; border: 1px solid rgba(16,185,129,.35); }
    #statusBox.error   { background: rgba(239,68,68,.10); color: #fca5a5; border: 1px solid rgba(239,68,68,.35); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
      margin-right: 8px; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Book list ───────────────────────────────────────────────────── */
    .subject-group { margin-bottom: 22px; }
    .subject-label {
      font-family: var(--arcade); font-size: 0.55rem; letter-spacing: .15em;
      color: var(--amber); margin-bottom: 10px; text-transform: uppercase;
    }
    .book-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; background: var(--glass); border: 1px solid var(--border);
      border-radius: 11px; margin-bottom: 8px; transition: all .2s;
    }
    .book-row:hover { border-color: rgba(99,102,241,.4); background: rgba(99,102,241,.05); }
    .book-info { flex: 1; min-width: 0; }
    .book-title { font-size: 0.92rem; font-weight: 600; color: #fff; }
    .book-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
    .book-id { font-size: 0.7rem; color: var(--text-dim); font-family: "SF Mono", Consolas, monospace; margin-top: 4px; }

    .btn-delete {
      padding: 7px 14px; background: transparent; color: #fca5a5;
      border: 1px solid rgba(239,68,68,.35); border-radius: 8px;
      font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all .15s;
      flex-shrink: 0;
    }
    .btn-delete:hover { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 4px 14px rgba(239,68,68,.4); }

    .empty-msg { text-align: center; padding: 36px; color: var(--text-muted); font-size: 0.875rem; }
    .empty-msg a { color: var(--primary); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,.45); }
  </style>
</head>
<body>

<header>
  <div class="logo">VERNA<span>SOLVER</span> — Admin</div>
  <a href="/app">← Back to Chat</a>
</header>

<div class="page">
  <div>
    <h1>Book Management</h1>
  </div>

  <!-- ── Upload card ── -->
  <div class="card">
    <h2>Add a Book</h2>

    <div id="dropzone">
      <div class="icon">📄</div>
      <p><strong>Click to choose a PDF</strong> or drag and drop here</p>
      <div id="fileName"></div>
      <input type="file" id="fileInput" accept=".pdf" />
    </div>

    <div class="fields">
      <div class="field full">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="e.g. Software Engineering" />
      </div>
      <div class="field">
        <label>Book Title</label>
        <input type="text" id="title" placeholder="e.g. Software Engineering" />
      </div>
      <div class="field">
        <label>Author</label>
        <input type="text" id="author" placeholder="e.g. Roger Pressman" />
      </div>
    </div>

    <button id="submitBtn" disabled>Ingest Book</button>
    <div id="statusBox"></div>
  </div>

  <!-- ── Book list card ── -->
  <div class="card">
    <h2>Ingested Books</h2>
    <div id="bookList"><p class="empty-msg">Loading...</p></div>
  </div>
</div>

<script>
  const dropzone  = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileName  = document.getElementById('fileName');
  const subject   = document.getElementById('subject');
  const title     = document.getElementById('title');
  const author    = document.getElementById('author');
  const submitBtn = document.getElementById('submitBtn');
  const statusBox = document.getElementById('statusBox');
  const bookList  = document.getElementById('bookList');

  let selectedFile = null;
  let pollInterval = null;

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file?.type === 'application/pdf') setFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  function setFile(file) {
    selectedFile = file;
    fileName.textContent = `Selected: ${file.name}`;
    checkReady();
  }

  [subject, title, author].forEach(el => el.addEventListener('input', checkReady));
  function checkReady() {
    submitBtn.disabled = !(selectedFile && subject.value.trim() && title.value.trim() && author.value.trim());
  }

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('subject', subject.value.trim());
    fd.append('title', title.value.trim());
    fd.append('author', author.value.trim());

    submitBtn.disabled = true;
    setStatus('running', 'Uploading file...');

    const res = await fetch('/api/ingest', { method: 'POST', body: fd });
    const { job_id } = await res.json();

    pollInterval = setInterval(async () => {
      const r = await fetch(`/api/ingest/${job_id}`);
      const data = await r.json();
      setStatus(data.status, data.message);

      if (data.status === 'done' || data.status === 'error') {
        clearInterval(pollInterval);
        if (data.status === 'done') {
          selectedFile = null;
          fileInput.value = '';
          fileName.textContent = '';
          subject.value = '';
          title.value = '';
          author.value = '';
          checkReady();
          loadBooks();
        }
      }
    }, 1500);
  });

  function setStatus(status, message) {
    statusBox.style.display = 'block';
    statusBox.className = status;
    const spinner = status === 'running' ? '<span class="spinner"></span>' : '';
    const icon = status === 'done' ? '✅ ' : status === 'error' ? '❌ ' : '';
    statusBox.innerHTML = `${spinner}${icon}${escapeHtml(message)}`;
  }

  async function loadBooks() {
    const res = await fetch('/api/books');
    const { books } = await res.json();

    if (books.length === 0) {
      bookList.innerHTML = '<p class="empty-msg">No books yet. Add one above.</p>';
      return;
    }

    const bySubject = {};
    books.forEach(b => {
      if (!bySubject[b.subject]) bySubject[b.subject] = [];
      bySubject[b.subject].push(b);
    });

    bookList.innerHTML = Object.entries(bySubject).sort(([a],[b]) => a.localeCompare(b)).map(([subj, list]) => `
      <div class="subject-group">
        <div class="subject-label">${escapeHtml(subj)}</div>
        ${list.map(b => `
          <div class="book-row" id="row-${b.book_id}">
            <div class="book-info">
              <div class="book-title">${escapeHtml(b.title)}</div>
              <div class="book-meta">${escapeHtml(b.author)} · ${b.pages} pages · ${b.chunks} chunks</div>
              <div class="book-id">${escapeHtml(b.book_id)}</div>
            </div>
            <button class="btn-delete" onclick="deleteBook('${escapeHtml(b.book_id)}', '${escapeHtml(b.title)}')">Remove</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  async function deleteBook(bookId, bookTitle) {
    if (!confirm(`Remove "${bookTitle}" from the knowledge base? This cannot be undone.`)) return;
    const res = await fetch(`/api/books/${encodeURIComponent(bookId)}`, { method: 'DELETE' });
    if (res.ok) {
      document.getElementById(`row-${bookId}`)?.remove();
      document.querySelectorAll('.subject-group').forEach(g => {
        if (g.querySelectorAll('.book-row').length === 0) g.remove();
      });
      if (document.querySelectorAll('.book-row').length === 0) {
        bookList.innerHTML = '<p class="empty-msg">No books yet. Add one above.</p>';
      }
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadBooks();
</script>
</body>
</html>
